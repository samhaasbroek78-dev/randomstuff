<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hormuz Strait вАФ Live Ship Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#060c12;--border:#1a3a5c;
  --accent:#00d4ff;--accent2:#00ff9d;
  --warn:#ffaa00;--danger:#ff4444;
  --text:#c8dff0;--muted:#4a7a9b;
  --tanker:#ff6b35;--cargo:#00d4ff;--military:#39d353;--unknown:#888;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);
  font-family:'Barlow Condensed',sans-serif;overflow:hidden;}

#map{position:absolute;inset:0;z-index:1;}
.leaflet-container{background:#0d1117!important;}
.leaflet-control-attribution{
  background:rgba(6,12,18,0.85)!important;color:var(--muted)!important;font-size:9px!important;}

#scanline{position:absolute;inset:0;pointer-events:none;z-index:2;overflow:hidden;}
#scanline::after{
  content:'';position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,0.07),transparent);
  animation:scan 7s linear infinite;}
@keyframes scan{from{top:-2px;}to{top:100%}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.8);}}

/* TOP BAR */
#topbar{
  position:absolute;top:0;left:0;right:0;z-index:10;height:52px;
  background:linear-gradient(180deg,rgba(6,12,18,0.97),rgba(6,12,18,0.88));
  border-bottom:1px solid var(--border);padding:8px 16px;
  display:flex;align-items:center;gap:14px;}
#logo{font-family:'Share Tech Mono',monospace;font-size:16px;color:var(--accent);
  letter-spacing:3px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);
  animation:pulse 1.4s ease-in-out infinite;}
.stat-box{background:rgba(0,212,255,0.04);border:1px solid var(--border);border-radius:4px;
  padding:3px 12px;display:flex;flex-direction:column;min-width:76px;}
.stat-label{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.stat-val{font-family:'Share Tech Mono',monospace;font-size:18px;color:var(--accent);line-height:1.15;}
.stat-val.green{color:var(--accent2);}
.stat-val.orange{color:var(--tanker);}
#clock{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted);margin-left:auto;}

/* LEFT PANEL */
#leftpanel{
  position:absolute;left:0;top:52px;bottom:28px;width:290px;z-index:10;
  background:linear-gradient(90deg,rgba(6,12,18,0.97),rgba(6,12,18,0.88));
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  transition:transform 0.3s ease;}
#leftpanel.collapsed{transform:translateX(-266px);}
#panel-toggle{
  position:absolute;right:-26px;top:50%;transform:translateY(-50%);
  width:26px;height:56px;background:rgba(6,12,18,0.95);
  border:1px solid var(--border);border-left:none;border-radius:0 4px 4px 0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--accent);}
.panel-hdr{padding:8px 12px 6px;font-size:9px;letter-spacing:3px;color:var(--muted);
  border-bottom:1px solid rgba(26,58,92,0.5);text-transform:uppercase;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.panel-hdr b{color:var(--accent);font-family:'Share Tech Mono',monospace;font-weight:400;}
#ships-list{flex:1;overflow-y:auto;padding:6px;}
#ships-list::-webkit-scrollbar{width:3px;}
#ships-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.ship-row{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:3px;
  cursor:pointer;border-bottom:1px solid rgba(26,58,92,0.25);transition:background 0.12s;}
.ship-row:hover{background:rgba(0,212,255,0.06);}
.ship-row.active{background:rgba(0,212,255,0.1);border-left:2px solid var(--accent);padding-left:6px;}
.ship-flag{font-size:18px;flex-shrink:0;line-height:1;}
.ship-info{flex:1;min-width:0;}
.ship-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ship-meta{font-size:10px;color:var(--muted);margin-top:1px;}
.badge{font-size:8px;padding:2px 5px;border-radius:2px;letter-spacing:1px;flex-shrink:0;text-transform:uppercase;}
.badge-tanker{background:rgba(255,107,53,0.15);color:var(--tanker);border:1px solid rgba(255,107,53,0.3);}
.badge-cargo{background:rgba(0,212,255,0.1);color:var(--accent);border:1px solid rgba(0,212,255,0.2);}
.badge-military{background:rgba(57,211,83,0.1);color:var(--military);border:1px solid rgba(57,211,83,0.3);}
.badge-unknown{background:rgba(136,136,136,0.1);color:var(--unknown);border:1px solid rgba(136,136,136,0.25);}

/* RIGHT DETAIL PANEL */
#detailpanel{
  position:absolute;right:0;top:52px;bottom:28px;width:280px;z-index:10;
  background:linear-gradient(270deg,rgba(6,12,18,0.97),rgba(6,12,18,0.88));
  border-left:1px solid var(--border);display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform 0.3s ease;}
#detailpanel.open{transform:translateX(0);}
#detail-close{
  position:absolute;left:-28px;top:12px;width:28px;height:28px;
  background:rgba(6,12,18,0.95);border:1px solid var(--border);border-right:none;
  border-radius:4px 0 0 4px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px;}
#detail-close:hover{color:var(--text);}
#detail-scroll{flex:1;overflow-y:auto;padding:14px;}
#detail-scroll::-webkit-scrollbar{width:3px;}
#detail-scroll::-webkit-scrollbar-thumb{background:var(--border);}
.dflag{font-size:44px;margin-bottom:6px;display:block;}
.dname{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:2px;}
.dmmsi{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px;}
.dcell{background:rgba(0,212,255,0.04);border:1px solid var(--border);border-radius:3px;padding:6px 8px;}
.dlabel{font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.dval{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--text);margin-top:2px;}
.dval.ac{color:var(--accent);}
.dval.or{color:var(--tanker);}
.dval.wn{color:var(--warn);}
.dval.gr{color:var(--accent2);}
.dextra{margin-top:8px;padding:8px 10px;border:1px solid var(--border);border-radius:3px;
  background:rgba(0,212,255,0.03);display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.dextra .full{grid-column:1/-1;}
.dextra-label{font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.dextra-val{font-family:'Share Tech Mono',monospace;font-size:12px;margin-top:2px;}
.center-btn{
  margin-top:10px;width:100%;padding:8px;
  background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.25);border-radius:3px;
  color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-size:12px;
  letter-spacing:2px;cursor:pointer;transition:background 0.15s;}
.center-btn:hover{background:rgba(0,212,255,0.16);}

/* MAP CONTROLS */
#map-controls{position:absolute;right:10px;top:62px;z-index:10;display:flex;flex-direction:column;gap:4px;}
.mctrl{width:36px;height:36px;background:rgba(6,12,18,0.92);border:1px solid var(--border);
  border-radius:4px;color:var(--accent);font-size:20px;font-family:'Share Tech Mono',monospace;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background 0.12s,border-color 0.12s;user-select:none;}
.mctrl:hover{background:rgba(0,212,255,0.1);border-color:var(--accent);}
.mctrl:active{transform:scale(0.93);}
.zdivider{height:1px;background:var(--border);margin:0 3px;}
#sat-btn{width:auto;height:28px;padding:0 9px;font-size:9px;letter-spacing:2px;
  font-family:'Barlow Condensed',sans-serif;font-weight:600;color:var(--muted);gap:4px;margin-top:4px;}
#sat-btn.active{color:var(--accent2);border-color:var(--accent2);background:rgba(0,255,157,0.07);}

/* LEGEND */
#legend{position:absolute;left:300px;bottom:36px;z-index:10;
  background:rgba(6,12,18,0.9);border:1px solid var(--border);
  border-radius:4px;padding:8px 12px;font-size:10px;}
.leg-row{display:flex;align-items:center;gap:7px;margin:3px 0;}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* STATUS BAR */
#statusbar{position:absolute;bottom:0;left:0;right:0;height:28px;z-index:10;
  background:linear-gradient(0deg,rgba(6,12,18,0.97),rgba(6,12,18,0.88));
  border-top:1px solid var(--border);padding:0 16px;
  display:flex;align-items:center;gap:12px;
  font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;}
#conn-status{display:flex;align-items:center;gap:5px;}
.cdot{width:6px;height:6px;border-radius:50%;}
.cdot.connected{background:var(--accent2);animation:pulse 2s infinite;}
.cdot.connecting{background:var(--warn);animation:pulse 0.8s infinite;}
.cdot.error{background:var(--danger);}
.sep{opacity:0.3;}

/* CORNER ACCENTS */
.corner{position:absolute;width:18px;height:18px;pointer-events:none;z-index:11;}
.corner.tl{top:56px;left:294px;border-top:1px solid rgba(0,212,255,0.4);border-left:1px solid rgba(0,212,255,0.4);}
.corner.tr{top:56px;right:3px;border-top:1px solid rgba(0,212,255,0.4);border-right:1px solid rgba(0,212,255,0.4);}
.corner.bl{bottom:32px;left:294px;border-bottom:1px solid rgba(0,212,255,0.4);border-left:1px solid rgba(0,212,255,0.4);}
.corner.br{bottom:32px;right:3px;border-bottom:1px solid rgba(0,212,255,0.4);border-right:1px solid rgba(0,212,255,0.4);}

/* SHIP MARKERS вАФ flag stays upright, only arrow element rotates */
.sm-wrap{display:flex;flex-direction:column;align-items:center;cursor:pointer;}
.sm-flag{font-size:13px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.9));}
.sm-arrow{width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;margin-top:1px;}
.sm-arrow.tanker{border-bottom:10px solid var(--tanker);}
.sm-arrow.cargo{border-bottom:10px solid var(--cargo);}
.sm-arrow.military{border-bottom:10px solid var(--military);}
.sm-arrow.unknown{border-bottom:10px solid var(--unknown);}

/* Stale (last-known) markers вАФ dimmed, no arrow, ghost ring */
.sm-wrap.stale{opacity:0.42;filter:grayscale(0.5);}
.sm-ring{
  width:18px;height:18px;border-radius:50%;margin-top:2px;
  border:1.5px dashed rgba(255,255,255,0.45);
  animation:ring-pulse 3s ease-in-out infinite;
}
@keyframes ring-pulse{0%,100%{transform:scale(1);opacity:0.45;}50%{transform:scale(1.25);opacity:0.2;}}
.badge-stale{background:rgba(255,170,0,0.12);color:var(--warn);border:1px solid rgba(255,170,0,0.3);}
</style>
</head>
<body>
<div id="map"></div>
<div id="scanline"></div>

<div id="topbar">
  <div id="logo"><div class="pulse-dot"></div>HORMUZ TRACKER</div>
  <div class="stat-box"><span class="stat-label">Live</span><span class="stat-val green" id="cnt-total">0</span></div>
  <div class="stat-box"><span class="stat-label">Tankers</span><span class="stat-val orange" id="cnt-tanker">0</span></div>
  <div class="stat-box"><span class="stat-label">Cargo</span><span class="stat-val" id="cnt-cargo">0</span></div>
  <div class="stat-box"><span class="stat-label">Military</span><span class="stat-val" style="color:var(--military)" id="cnt-military">0</span></div>
  <div class="stat-box"><span class="stat-label">Avg Spd</span><span class="stat-val" id="cnt-spd">вАФ kt</span></div>
  <div id="clock">UTC 00:00:00</div>
</div>

<div id="leftpanel">
  <div class="panel-hdr">Active vessels <b id="list-count">0</b>
    <div id="panel-toggle" onclick="togglePanel()">вЧА</div>
  </div>
  <div id="ships-list"></div>
</div>

<div id="detailpanel">
  <div id="detail-close" onclick="closeDetail()">вЬХ</div>
  <div id="detail-scroll"><div id="detail-inner"></div></div>
</div>

<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div id="map-controls">
  <div class="mctrl" onclick="map.zoomIn()" title="Zoom in (+)">+</div>
  <div class="zdivider"></div>
  <div class="mctrl" onclick="map.zoomOut()" title="Zoom out (-)">вИТ</div>
  <button id="sat-btn" class="mctrl active" onclick="toggleSatellite()" title="Toggle map view (S)">
    <svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor" style="flex-shrink:0">
      <path d="M2 2h4v4H2zm8 0h4v4h-4zM2 10h4v4H2zm8 0h4v4h-4z"/>
    </svg>DARK
  </button>
</div>

<div id="legend">
  <div style="font-size:8px;letter-spacing:2px;color:var(--muted);margin-bottom:5px;">VESSEL TYPE</div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--tanker)"></div><span>Tanker</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--cargo)"></div><span>Cargo / Container</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--military)"></div><span>Military</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--unknown)"></div><span>Pending type</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:rgba(255,255,255,0.25);border:1.5px dashed rgba(255,255,255,0.5);box-sizing:border-box;"></div><span style="color:var(--warn)">Last known pos.</span></div>
  <div style="margin-top:7px;padding-top:7px;border-top:1px solid var(--border);
    font-size:8px;letter-spacing:2px;color:var(--muted);">ICON = FLAG STATE</div>
</div>

<div id="statusbar">
  <div id="conn-status">
    <div class="cdot connecting" id="conn-dot"></div>
    <span id="conn-text">CONNECTING...</span>
  </div>
  <span class="sep">|</span><span id="zoom-display">ZOOM 7</span>
  <span class="sep">|</span><span id="last-fix">NO DATA</span>
  <span class="sep">|</span><span>AISSTREAM.IO</span>
  <span class="sep">|</span><span id="msg-count">0 MSG</span>
</div>

/* вФАвФА MARKER вФАвФА */
function isStale(ship) { return (Date.now() - (ship.updated || 0)) > STALE_DIM; }

function makeIcon(ship) {
  const flag  = getFlag(ship.mmsi);
  const stale = isStale(ship);
  let html;
  if (stale) {
    // Last-known position: dimmed flag + pulsing ghost ring, no directional arrow
    html = `<div class="sm-wrap stale">
      <div class="sm-flag">${flag}</div>
      <div class="sm-ring"></div>
    </div>`;
  } else {
    const deg = isFinite(ship.cog) ? ship.cog : 0;
    const cls = arrowClass(ship.type);
    html = `<div class="sm-wrap">
      <div class="sm-flag">${flag}</div>
      <div class="sm-arrow ${cls}" style="transform:rotate(${deg}deg);transform-origin:50% 0;"></div>
    </div>`;
  }
  return L.divIcon({ html, className: '', iconSize: [22, 28], iconAnchor: [11, 11] });
}

/* вФАвФА UPSERT SHIP вФАвФА */
// Accept ALL vessels with valid coordinates.
// Type drives colour only. Non-commercial vessels are removed on a 30s grace timer
// once static data confirms their type, so tankers/cargo always appear immediately.
function upsertShip(data) {
  const mmsi = data.mmsi;

  // Cancel any scheduled removal for this MMSI (fresh position data = still active)
  if (pendingRemoval.has(mmsi)) {
    clearTimeout(pendingRemoval.get(mmsi));
    pendingRemoval.delete(mmsi);
  }

  if (ships.has(mmsi)) {
    const s = ships.get(mmsi);
    if (!data.type && s.type) data.type = s.type;  // preserve confirmed type
    Object.assign(s, data);
    s.updated = data.fixTime || Date.now();
    s.marker.setLatLng([s.lat, s.lon]);
    s.marker.setIcon(makeIcon(s));  // always refresh вАФ reverts ghost to active
  } else {
    const marker = L.marker([data.lat, data.lon], { icon: makeIcon(data) }).addTo(map);
    marker.on('click', () => showDetail(mmsi));
    ships.set(mmsi, { ...data, marker, updated: data.fixTime || Date.now() });
  }
  scheduleRender();
}

/* вФАвФА HELPERS вФАвФА */
function lastSeenStr(ageMs) {
  const s = Math.round(ageMs / 1000);
  if (s < 60)   return `last seen ${s}s ago`;
  const m = Math.round(s / 60);
  if (m < 60)   return `last seen ${m}m ago`;
  const h = Math.round(m / 60);
  if (h < 24)   return `last seen ${h}h ago`;
  return `last seen ${Math.round(h / 24)}d ago`;
}

/* вФАвФА RENDER (rAF-batched) вФАвФА */
function scheduleRender() {
  if (renderPending) return;
  renderPending = true;
  requestAnimationFrame(() => { renderPending = false; renderStats(); renderList(); });
}

function renderStats() {
  let tankers = 0, cargo = 0, military = 0, staleCount = 0, speedSum = 0, speedN = 0;
  ships.forEach(s => {
    if (isStale(s)) { staleCount++; return; }
    if (isTanker(s.type))   tankers++;
    else if (isCargo(s.type))    cargo++;
    else if (isMilitary(s.type)) military++;
    if (s.sog > 0.1 && s.sog < 50) { speedSum += s.sog; speedN++; }
  });
  document.getElementById('cnt-total').textContent    = ships.size;
  document.getElementById('cnt-tanker').textContent   = tankers;
  document.getElementById('cnt-cargo').textContent    = cargo;
  document.getElementById('cnt-military').textContent = military;
  document.getElementById('cnt-spd').textContent      = speedN ? (speedSum / speedN).toFixed(1) + ' kt' : 'вАФ kt';
  document.getElementById('list-count').textContent   = ships.size;
}

function renderList() {
  const sorted = [...ships.values()]
    .sort((a, b) => (b.updated || 0) - (a.updated || 0))
    .slice(0, 100);

  document.getElementById('ships-list').innerHTML = sorted.map(s => {
    const stale  = isStale(s);
    const name   = (s.name || ('MMSI ' + s.mmsi)).substring(0, 24);
    const age    = Date.now() - (s.updated || 0);
    const spd    = (!stale && s.sog != null) ? s.sog.toFixed(1) + ' kt' : lastSeenStr(age);
    const act    = selectedMMSI === s.mmsi ? ' active' : '';
    const dimmed = stale ? ' style="opacity:0.5"' : '';
    const badge  = stale
      ? `<span class="badge badge-stale">LAST POS</span>`
      : `<span class="badge ${badgeClass(s.type)}">${badgeLabel(s.type)}</span>`;
    return `<div class="ship-row${act}"${dimmed} onclick="showDetail(${s.mmsi})">
      <div class="ship-flag">${getFlag(s.mmsi)}</div>
      <div class="ship-info">
        <div class="ship-name">${name}</div>
        <div class="ship-meta">${spd} ¬Ј ${getCountry(s.mmsi)}</div>
      </div>
      ${badge}
    </div>`;
  }).join('');
}

/* вФАвФА STALE SWEEP вАФ runs every 60s вФАвФА */
setInterval(() => {
  const now    = Date.now();
  const remove = now - STALE_REMOVE;
  const dim    = now - STALE_DIM;
  ships.forEach((s, mmsi) => {
    if (s.updated < remove) {
      // Gone for 6+ hours вАФ remove entirely
      s.marker.remove();
      ships.delete(mmsi);
    } else if (s.updated < dim) {
      // 5 min+ silent вАФ refresh icon to ghost/stale appearance
      s.marker.setIcon(makeIcon(s));
    }
  });
  scheduleRender();
}, 60_000);

/* вФАвФА STATIC CACHE MERGE вФАвФА */
// Consolidates fields from any static data message (type 5, 24) into the
// cache and updates any live marker already on the map.
function mergeStaticCache(mmsi, fields) {
  const prev = staticCache.get(mmsi) || {};
  const next  = {
    type:     fields.type     || prev.type     || 0,
    name:     fields.name     || prev.name     || '',
    dest:     fields.dest     !== undefined ? (fields.dest || prev.dest || '') : (prev.dest || ''),
    callsign: fields.callsign || prev.callsign || '',
    imo:      fields.imo      || prev.imo      || 0,
  };
  staticCache.set(mmsi, next);

  if (!ships.has(mmsi)) return;
  const s = ships.get(mmsi);
  if (next.type)     s.type     = next.type;
  if (next.name)     s.name     = next.name;
  if (next.dest)     s.dest     = next.dest;
  if (next.callsign) s.callsign = next.callsign;
  if (next.imo)      s.imo      = next.imo;

  if (next.type > 0 && !isKnown(next.type)) {
    if (!pendingRemoval.has(mmsi)) {
      pendingRemoval.set(mmsi, setTimeout(() => {
        if (ships.has(mmsi)) { ships.get(mmsi).marker.remove(); ships.delete(mmsi); }
        pendingRemoval.delete(mmsi);
        scheduleRender();
      }, 30_000));
    }
  } else {
    s.marker.setIcon(makeIcon(s));
  }
  scheduleRender();
}

/* вФАвФА POLL ENGINE вФАвФА
   Calls /api/vessels (Vercel serverless function) every 30 seconds.
   The function opens the AISStream WebSocket server-side (no CORS issues),
   collects 8 seconds of AIS data, and returns a JSON vessel array.    */

const POLL_MS = 30_000;  // refresh every 30 seconds
let pollTimer  = null;
let reconnects = 0;

async function fetchVessels() {
  setStatus('connecting', 'REFRESHING...');

  try {
    const res = await fetch('/api/vessels', {
      headers: { 'Accept': 'application/json' },
      signal: AbortSignal.timeout(12_000),   // abort if server takes > 12s
    });

    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      const msg  = body.error || `HTTP ${res.status}`;
      setStatus('error', msg.substring(0, 50));
      scheduleRetry();
      return;
    }

    const data    = await res.json();
    const vessels = Array.isArray(data.vessels) ? data.vessels : [];

    msgCount += vessels.length;
    updateFix(vessels.length);
    setStatus('connected', `LIVE ¬Ј ${vessels.length} VESSELS`);
    reconnects = 0;

    vessels.forEach(v => {
      const mmsi = parseInt(v.mmsi || 0);
      if (!mmsi) return;

      // Merge static data into cache for detail panel
      if (v.name || v.imo || v.dest) {
        mergeStaticCache(mmsi, {
          type: v.type || 0, name: v.name || '', dest: v.dest || '',
          callsign: v.callsign || '', imo: v.imo || 0,
        });
      }

      upsertShip({
        mmsi,
        lat:      v.lat,      lon:      v.lon,
        sog:      v.sog,      cog:      v.cog,
        hdg:      v.hdg,      status:   v.status,
        type:     v.type,     name:     v.name     || '',
        dest:     v.dest     || '',
        callsign: v.callsign || '',
        imo:      v.imo      || 0,
        fixTime:  v.fixTime  || Date.now(),
      });
    });

    scheduleRender();

  } catch (err) {
    const msg = err.name === 'TimeoutError' ? 'REQUEST TIMEOUT' : 'NETWORK ERROR';
    console.warn('[AIS proxy]', err.message);
    setStatus('error', msg + ' ¬Ј RETRYING');
    scheduleRetry();
  }
}

function scheduleRetry() {
  clearTimeout(pollTimer);
  const delay = Math.min(5_000 * Math.pow(1.5, reconnects), 60_000);
  reconnects++;
  pollTimer = setTimeout(startPolling, delay);
}

function startPolling() {
  clearTimeout(pollTimer);
  fetchVessels();
  pollTimer = setInterval(fetchVessels, POLL_MS);
}

function updateFix(count) {
  const n = new Date();
  const pad = v => String(v).padStart(2, '0');
  document.getElementById('last-fix').textContent =
    `FIX ${pad(n.getUTCHours())}:${pad(n.getUTCMinutes())}:${pad(n.getUTCSeconds())} UTC`;
  document.getElementById('msg-count').textContent = count + ' VESSELS';
}

/* вФАвФА KEYBOARD вФАвФА */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === '+' || e.key === '=') map.zoomIn();
  if (e.key === '-' || e.key === '_') map.zoomOut();
  if (e.key.toLowerCase() === 's')   toggleSatellite();
  if (e.key === 'Escape')            closeDetail();
  if (e.key === 'r' || e.key === 'R') { clearTimeout(pollTimer); fetchVessels(); }
});

startPolling();
</script>
